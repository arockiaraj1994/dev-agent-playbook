# Dev Agent Playbook MCP — optional settings (see MCP_CONFIG to override path).
# When the file is missing, defaults match: enable.auth = false.

[enable]
# If true, Bearer tokens are required for /sse and /dashboard.
# Tokens are issued via POST /auth/login and managed in /dashboard/tokens.
auth = true

[admin]
# Default admin credentials seeded on first run (when no users exist).
# Override via MCP_ADMIN_USER and MCP_ADMIN_PASSWORD environment variables.
username = "admin"
password = "admin"
